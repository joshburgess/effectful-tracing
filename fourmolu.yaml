# Based on the Haskell Foundation's recommended fourmolu configuration.
# Run locally with: fourmolu -i src/ test/ bench/
indentation: 4
function-arrows: leading
comma-style: leading
import-export-style: leading
indent-wheres: false
record-brace-space: false
newlines-between-decls: 1
haddock-style: multi-line
haddock-style-module: null
let-style: auto
in-style: right-align
single-constraint-parens: never
single-deriving-parens: auto
sort-constraints: false
sort-derived-classes: false
sort-deriving-lists: false
respectful: true
fixities: []
reexports: []
unicode: never
