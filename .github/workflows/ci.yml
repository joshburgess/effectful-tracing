name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: build & test (${{ matrix.os }}, GHC ${{ matrix.ghc }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        ghc: ["9.6.7", "9.8.4", "9.10.3"]
        # Keep CI bounded: the full GHC matrix runs on Linux, while macOS and
        # Windows build and test only the latest supported GHC (where a
        # platform-specific break is most likely to surface).
        exclude:
          - os: macos-latest
            ghc: "9.6.7"
          - os: macos-latest
            ghc: "9.8.4"
          - os: windows-latest
            ghc: "9.6.7"
          - os: windows-latest
            ghc: "9.8.4"
    steps:
      - uses: actions/checkout@v4

      - name: Set up GHC and cabal
        id: setup
        uses: haskell-actions/setup@v2
        with:
          ghc-version: ${{ matrix.ghc }}
          cabal-version: "3.14.2.0"

      - name: Configure
        run: cabal configure --enable-tests --enable-benchmarks

      - name: Cache cabal store
        uses: actions/cache@v4
        with:
          # The cabal store lives in different places per OS; take the path the
          # setup action reports rather than hard-coding the Linux location.
          path: ${{ steps.setup.outputs.cabal-store }}
          key: ${{ runner.os }}-ghc${{ matrix.ghc }}-${{ hashFiles('effectful-tracing.cabal', 'cabal.project') }}
          restore-keys: |
            ${{ runner.os }}-ghc${{ matrix.ghc }}-

      - name: Build (incl. benchmarks)
        run: cabal build all

      - name: Test
        run: cabal test all --test-show-details=direct

  flags:
    name: build & test with all flags (GHC 9.10.3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up GHC and cabal
        uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.10.3"
          cabal-version: "3.14.2.0"

      # The postgresql-simple flag pulls in postgresql-libpq, which needs the
      # libpq headers and pg_config at build time.
      - name: Install libpq
        run: sudo apt-get update && sudo apt-get install -y libpq-dev

      - name: Configure
        run: cabal configure --enable-tests --flags="otel wai http-client secure-ids postgresql-simple sqlite-simple servant"

      - name: Cache cabal store
        uses: actions/cache@v4
        with:
          path: ~/.local/state/cabal/store
          key: ${{ runner.os }}-ghc9.10.3-flags-${{ hashFiles('effectful-tracing.cabal', 'cabal.project') }}
          restore-keys: |
            ${{ runner.os }}-ghc9.10.3-flags-

      - name: Build (all flags)
        run: cabal build all --flags="otel wai http-client secure-ids postgresql-simple sqlite-simple servant"

      - name: Test (all flags)
        run: cabal test all --flags="otel wai http-client secure-ids postgresql-simple sqlite-simple servant" --test-show-details=direct

  haddock:
    name: haddock (GHC 9.10.3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up GHC and cabal
        uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.10.3"
          cabal-version: "3.14.2.0"

      # The postgresql-simple flag pulls in postgresql-libpq, which needs the
      # libpq headers and pg_config at build time.
      - name: Install libpq
        run: sudo apt-get update && sudo apt-get install -y libpq-dev

      - name: Cache cabal store
        uses: actions/cache@v4
        with:
          path: ~/.local/state/cabal/store
          key: ${{ runner.os }}-ghc9.10.3-haddock-${{ hashFiles('effectful-tracing.cabal', 'cabal.project') }}
          restore-keys: |
            ${{ runner.os }}-ghc9.10.3-haddock-

      # Build docs for every module (all flags) and fail on (a) any broken
      # doc-link or (b) any module whose Haddock coverage is below 100%. The
      # first guards the doc-link cleanup; the second keeps every new export
      # documented.
      - name: Build Haddock (fail on broken doc-links or <100% coverage)
        run: |
          set -o pipefail
          cabal haddock all --flags="otel wai http-client secure-ids postgresql-simple sqlite-simple servant" 2>&1 | tee haddock.log
          if grep -q "could not find link destination" haddock.log; then
            echo "::error::Haddock reported broken doc-links (see log above)"
            exit 1
          fi
          # Coverage lines look like " 100% (  5 /  5) in 'Module'"; flag any
          # that are not at 100%.
          if grep ") in '" haddock.log | grep -qv "100% "; then
            echo "::error::Haddock coverage is below 100% in:"
            grep ") in '" haddock.log | grep -v "100% "
            exit 1
          fi

  example:
    name: build servant example (GHC 9.10.3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up GHC and cabal
        uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.10.3"
          cabal-version: "3.14.2.0"

      - name: Cache cabal store
        uses: actions/cache@v4
        with:
          path: ~/.local/state/cabal/store
          key: ${{ runner.os }}-ghc9.10.3-example-${{ hashFiles('examples/servant-app/servant-app.cabal', 'effectful-tracing.cabal') }}
          restore-keys: |
            ${{ runner.os }}-ghc9.10.3-example-

      # The example has its own cabal.project pointing at the in-tree library
      # (with +otel +wai +http-client), so building it here proves the example
      # still compiles against the current API.
      - name: Build example
        working-directory: examples/servant-app
        run: cabal build all

  local-examples:
    name: build local-dev examples (GHC 9.10.3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up GHC and cabal
        uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.10.3"
          cabal-version: "3.14.2.0"

      - name: Cache cabal store
        uses: actions/cache@v4
        with:
          path: ~/.local/state/cabal/store
          key: ${{ runner.os }}-ghc9.10.3-local-examples-${{ hashFiles('examples/local-dev/local-dev.cabal', 'effectful-tracing.cabal') }}
          restore-keys: |
            ${{ runner.os }}-ghc9.10.3-local-examples-

      # The local-dev examples build against the in-tree library with default
      # flags (no collector, no optional instrumentation), so building them here
      # proves both still compile against the current API.
      - name: Build local-dev examples
        working-directory: examples/local-dev
        run: cabal build all

  lower-bounds:
    name: lower bounds (--prefer-oldest, GHC 9.6.7)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up GHC and cabal
        uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.6.7"
          cabal-version: "3.14.2.0"

      - name: Cache cabal store
        uses: actions/cache@v4
        with:
          path: ~/.local/state/cabal/store
          key: ${{ runner.os }}-ghc9.6.7-oldest-${{ hashFiles('effectful-tracing.cabal', 'cabal.project') }}
          restore-keys: |
            ${{ runner.os }}-ghc9.6.7-oldest-

      # Solve and build against the floor of every dependency bound so the lower
      # bounds in the cabal file are not just aspirational. Run on the oldest
      # supported GHC (base 4.18) where those floors are most likely to bite.
      #
      # This runs the default build (library + core test/bench deps), which is
      # where our own lower bounds live. The optional-instrumentation flags
      # (+otel, +wai, +http-client) are deliberately omitted: they pull heavy
      # transitive chains (the OTel stack via vector-builder -> semigroups ->
      # deepseq -> array, and a Warp server in the http-client tests) whose
      # *oldest* published versions predate our supported GHC range and fail to
      # compile on a modern GHC. --prefer-oldest there would test those third
      # parties' GHC compatibility, not our bounds, so it is not meaningful here.
      - name: Configure (prefer oldest)
        run: cabal configure --enable-tests --enable-benchmarks --prefer-oldest

      - name: Build (prefer oldest)
        run: cabal build all --prefer-oldest

      - name: Test (prefer oldest)
        run: cabal test all --prefer-oldest --test-show-details=direct

  bench-gate:
    name: benchmark regression gate (GHC 9.10.3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up GHC and cabal
        id: setup
        uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.10.3"
          cabal-version: "3.14.2.0"

      - name: Cache cabal store
        uses: actions/cache@v4
        with:
          path: ${{ steps.setup.outputs.cabal-store }}
          key: ${{ runner.os }}-ghc9.10.3-bench-${{ hashFiles('effectful-tracing.cabal', 'cabal.project') }}
          restore-keys: |
            ${{ runner.os }}-ghc9.10.3-bench-

      # Run the tasty-bench suite. The realistic-op comparison uses
      # 'bcompareWithin' with a 1.20 upper bound, so the benchmark process exits
      # non-zero (failing this job) on a gross per-span overhead regression. The
      # bound is deliberately loose because CI runners are noisy shared VMs; this
      # gate catches order-of-magnitude regressions, not the 5% target tracked on
      # a quiet machine.
      - name: Run benchmark regression gate
        run: cabal bench effectful-tracing-bench

  publish-readiness:
    name: publish readiness (cabal check + build from sdist)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up GHC and cabal
        uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.10.3"
          cabal-version: "3.14.2.0"

      # The postgresql-simple flag pulls in postgresql-libpq, which needs the
      # libpq headers and pg_config at build time.
      - name: Install libpq
        run: sudo apt-get update && sudo apt-get install -y libpq-dev

      - name: Cache cabal store
        uses: actions/cache@v4
        with:
          path: ~/.local/state/cabal/store
          key: ${{ runner.os }}-ghc9.10.3-sdist-${{ hashFiles('effectful-tracing.cabal', 'cabal.project') }}
          restore-keys: |
            ${{ runner.os }}-ghc9.10.3-sdist-

      # Hackage runs `cabal check` on upload, so gate on it here. Then build the
      # package from the source distribution tarball (not the working tree) to
      # prove the sdist actually ships everything needed to compile.
      - name: cabal check
        run: cabal check

      - name: Build a source distribution
        run: cabal sdist all

      - name: Build the library and tests from the sdist
        run: |
          set -euo pipefail
          tarball=$(find dist-newstyle/sdist -name 'effectful-tracing-*.tar.gz' | head -n1)
          echo "Building from sdist: $tarball"
          workdir=$(mktemp -d)
          tar -xzf "$tarball" -C "$workdir"
          srcdir=$(find "$workdir" -maxdepth 1 -type d -name 'effectful-tracing-*')
          cd "$srcdir"
          cabal build all --enable-tests --flags="otel wai http-client secure-ids postgresql-simple sqlite-simple servant"

  hlint:
    name: hlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up hlint
        uses: haskell-actions/hlint-setup@v2
      - name: Run hlint
        uses: haskell-actions/hlint-run@v2
        with:
          path: '["src/", "test/", "test-space-leak/", "bench/"]'
          fail-on: warning
